<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clay Nation — 3D Asset Library</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#ffffff;--border:rgba(0,0,0,0.09);
  --text:#1a1a1a;--muted:#6b6b6b;--accent:#2E75B6;
  --accent-light:#e6f1fb;--radius:12px;--tag-bg:#eef0f3;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;flex-shrink:0}
.logo span{color:var(--accent)}
.search-wrap{flex:1;min-width:160px;max-width:360px}
.search-wrap input{width:100%;padding:7px 14px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.filters{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.fb{padding:5px 12px;border:0.5px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--surface);color:var(--muted);transition:all 0.12s;white-space:nowrap;flex-shrink:0}
.fb:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.fb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.count{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.stats-bar{display:flex;gap:24px;padding:12px 24px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-n{font-size:20px;font-weight:600;color:var(--accent)}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
main{padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.15s,transform 0.15s;display:flex;flex-direction:column}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.preview{width:100%;aspect-ratio:1;background:#f0eeea;position:relative;display:flex;align-items:center;justify-content:center;cursor:grab;min-height:160px}
.preview:active{cursor:grabbing}
.preview canvas{width:100%!important;height:100%!important;display:block}
.placeholder{width:100%;aspect-ratio:1;background:#f4f2ee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.cat-icon{font-size:42px;line-height:1;opacity:0.55}
.ph-type{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.8px;text-transform:uppercase;background:var(--tag-bg);padding:3px 8px;border-radius:4px}
.card-body{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:4px}
.card-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.35}
.card-meta{font-size:11px;color:var(--muted)}
.tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.tag{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:500}
.tag.glb{background:#e1f5ee;color:#0f6e56}
.tag.fbx{background:#eeedfe;color:#534AB7}
.tag.rar,.tag.zip{background:#faeeda;color:#854F0B}
.tag.folder{background:#e6f1fb;color:#185FA5}
.hint{font-size:9px;color:var(--muted);text-align:center;padding:3px 0;opacity:0.6}
.ld{position:absolute;inset:0;background:#f0eeea;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:11px;color:var(--muted)}
.sp{width:18px;height:18px;border:2px solid rgba(0,0,0,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-size:14px}
.sec{grid-column:1/-1;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.9px;text-transform:uppercase;padding:6px 0 2px;border-bottom:0.5px solid var(--border);margin-bottom:2px}
</style>
</head>

    const dl2=new THREE.DirectionalLight(0xffffff,0.3);dl2.position.set(-5,2,-5);scene.add(dl2);

    let controls;
    function initControls(){
      if(THREE.OrbitControls){
        controls=new THREE.OrbitControls(cam,canvas);
        controls.enableDamping=true;controls.dampingFactor=0.06;
        controls.autoRotate=true;controls.autoRotateSpeed=1.2;
        controls.enableZoom=true;controls.minDistance=0.5;controls.maxDistance=20;
      }
    }

    function doLoad(){
      initControls();
      const loader=new THREE.GLTFLoader();
      loader.load(GLB_BASE+asset.f,gltf=>{
        const model=gltf.scene;
        const box=new THREE.Box3().setFromObject(model);
        const ctr=box.getCenter(new THREE.Vector3());
        const sz=box.getSize(new THREE.Vector3());
        const sc=2.5/Math.max(sz.x,sz.y,sz.z);
        model.scale.setScalar(sc);model.position.sub(ctr.multiplyScalar(sc));
        scene.add(model);
        if(controls)controls.target.set(0,0,0);
        // Remove spinner
        const spinner=modalCanvas.querySelector(".sp");
        if(spinner)spinner.closest("div").remove();
      },xhr=>{
        const pct=Math.round(xhr.loaded/xhr.total*100);
        const sp=modalCanvas.querySelector("span");
        if(sp&&isFinite(pct))sp.textContent=`Loading… ${pct}%`;
      },()=>{
        modalCanvas.innerHTML='<div style="color:#999;font-size:13px;padding:20px;text-align:center">Could not load model</div>';
      });
      function anim(){modalAnimId=requestAnimationFrame(anim);if(controls)controls.update();modalRenderer&&modalRenderer.render(scene,cam);}
      anim();
    }

    function step2(){if(!THREE.OrbitControls){loadSc("https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js",doLoad);}else doLoad();}
    if(!THREE.GLTFLoader){loadSc("https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js",step2);}else step2();
  }
}

/* stats */
function buildStats(){
  const s=document.getElementById("sb");
  const glbs=A.filter(a=>a.t==="glb").length;
  const cats=new Set(A.map(a=>a.c)).size;
  [{n:"300+",l:"assets"},{n:glbs,l:"3D models"},{n:cats,l:"categories"}].forEach(({n,l})=>{
    const d=document.createElement("div");d.className="stat";
    d.innerHTML=`<span class="stat-n">${n}</span><span class="stat-l">${l}</span>`;
    s.appendChild(d);
  });
}

/* filters */
function buildFilters(){
  const cats=["All",...new Set(A.map(a=>a.c))];
  const wrap=document.getElementById("f");
  cats.forEach(c=>{
    const b=document.createElement("button");b.className="fb"+(c==="All"?" on":"");
    b.textContent=c==="All"?"All":`${ICONS[c]||""} ${c}`;
    b.onclick=()=>{cat=c;document.querySelectorAll(".fb").forEach(x=>x.classList.remove("on"));b.classList.add("on");render();};
    wrap.appendChild(b);
  });
}

/* cards — no auto-loading, just a thumbnail with click to open */
function makeCard(a){
  const card=document.createElement("div");card.className="card";
  if(a.t==="glb"){
    card.style.cursor="pointer";
    card.innerHTML=`
      <div class="placeholder" style="position:relative">
        <div class="cat-icon">${ICONS[a.c]||"📦"}</div>
        <div style="position:absolute;bottom:10px;right:10px;background:rgba(46,117,182,0.9);color:#fff;font-size:9px;font-weight:600;padding:3px 7px;border-radius:20px;letter-spacing:0.5px">3D</div>
      </div>
      <div class="card-body">
        <div class="card-name">${a.n}</div>
        <div class="tags"><span class="tag glb">GLB · click to view 3D</span></div>
      </div>`;
    card.onclick=()=>openModal(a);
  }else{
    card.innerHTML=`
      <div class="placeholder">
        <div class="cat-icon">${ICONS[a.c]||"📦"}</div>
        <div class="ph-type">${a.t.toUpperCase()}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${a.n}</div>
        <div class="tags"><span class="tag ${a.t}">${a.t.toUpperCase()}</span></div>
      </div>`;
  }
  return card;
}

/* render */
function filtered(){return A.filter(a=>{const mc=cat==="All"||a.c===cat;const mq=!q||a.n.toLowerCase().includes(q.toLowerCase())||a.c.toLowerCase().includes(q.toLowerCase())||(a.by||"").toLowerCase().includes(q.toLowerCase());return mc&&mq;});}
function render(){
  const list=filtered();const grid=document.getElementById("grid");grid.innerHTML="";
  document.getElementById("cnt").textContent=`${list.length} assets`;
  if(!list.length){grid.innerHTML='<div class="empty">No assets found</div>';return;}
  const byCat={};list.forEach(a=>{(byCat[a.c]=byCat[a.c]||[]).push(a);});
  Object.entries(byCat).forEach(([c,assets])=>{
    if(cat==="All"){const l=document.createElement("div");l.className="sec";l.textContent=`${ICONS[c]||""} ${c}  ·  ${assets.length}`;grid.appendChild(l);}
    assets.forEach(a=>grid.appendChild(makeCard(a)));
  });
}

buildStats();buildFilters();render();
document.getElementById("s").addEventListener("input",e=>{q=e.target.value;render();});
</script>
</body>
</html>
